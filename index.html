<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#151515">
    <meta name="description" content="Offline schedule for Conscious Man 2026.">
    <title>Conscious Man 2026 | Harmonogram</title>
    <link rel="icon" href="./icon.svg" type="image/svg+xml">
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="stylesheet" href="./styles.css">
    <script src="./data.js" defer></script>
    <script src="./app.js" defer></script>
  </head>
  <body>
    <a class="skip-link" href="#schedule-root">Przejdź do harmonogramu</a>

    <main class="app-shell" id="schedule-root">
      <nav class="day-tabs" id="day-tabs" role="tablist" aria-label="Dni festiwalu"></nav>

      <div class="schedule-days" id="schedule-days"></div>
    </main>

    <dialog class="session-dialog" id="session-dialog" aria-labelledby="dialog-title" aria-describedby="dialog-description">
      <form method="dialog" class="dialog-frame">
        <button class="icon-button dialog-close" value="close" aria-label="Zamknij szczegóły wydarzenia">
          <span aria-hidden="true">×</span>
        </button>
        <div class="dialog-meta" id="dialog-meta"></div>
        <h2 id="dialog-title"></h2>
        <p class="dialog-subtitle" id="dialog-subtitle"></p>
        <dl class="dialog-facts" id="dialog-facts"></dl>
        <div class="dialog-description" id="dialog-description"></div>
      </form>
    </dialog>
  </body>
</html>
